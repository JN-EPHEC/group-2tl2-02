<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ProjetHub</title>
    <link rel="stylesheet" href="css/connextion-inscription.css">
</head>
<body class="auth-page">

<header>
    <div class="logo-container">
        <img src="img/logo.png" alt="logo">
        <h2>ProjetHub</h2>
    </div>

    <div class="header-buttons">
        <a href="home.html" class="btn-home">
            Accueil
        </a>
    </div>
</header>

<main class="auth-container">
    <div class="auth-card">
        <h3>Rejoindre la communauté</h3>
        <form>
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" placeholder="Ex: RobotMaster99">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-full">Créer mon compte</button>
        </form>
        <p class="auth-switch">Déjà un compte ? <a href="connextion.html">Se connecter</a></p>
    </div>
</main>

</body>
</html>
