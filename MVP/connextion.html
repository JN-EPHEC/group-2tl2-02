<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ProjetHub</title>
    <link rel="stylesheet" href="css/connextion-inscription.css">
</head>
<body class="auth-page">

<header>
    <div class="logo-container">
        <img src="img/logo.png" alt="logo">
        <h2>ProjetHub</h2>
    </div>

    <div class="header-buttons">
        <a href="home.html" class="btn-home">
            Accueil
        </a>
    </div>
</header>

<main class="auth-container">
    <div class="auth-card">
        <h3>Bon retour !</h3>
        <form>
            <div class="input-group">
                <label>Email ou Pseudo</label>
                <input type="text" placeholder="Entrez votre identifiant">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-full">Se connecter</button>
        </form>
        <p class="auth-switch">Pas de compte ? <a href="inscription.html">Créer un compte</a></p>
    </div>
</main>

</body>
</html>
